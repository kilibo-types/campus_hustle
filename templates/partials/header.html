<header class="border-b border-slate-200 bg-white shadow-sm">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6">
        <a href="/" class="text-xl font-semibold text-slate-900">Campus Hustle</a>
        <nav class="flex items-center gap-3 text-sm">
            {% comment %} Determine active link by path.startswith checks {% endcomment %}
            <a href="/" class="{% if request.path == '/' %}text-slate-900 font-semibold{% else %}text-slate-700 hover:text-slate-900{% endif %}">Dashboard</a>
            <a href="/marketplace/" class="{% if request.path|slice:'0:12' == '/marketplace' %}text-slate-900 font-semibold{% else %}text-slate-700 hover:text-slate-900{% endif %}">Marketplace</a>
            {% if request.user.is_authenticated %}
                <a href="/profile/" class="{% if request.path|slice:'0:9' == '/profile/' %}text-slate-900 font-semibold{% else %}text-slate-700 hover:text-slate-900{% endif %}">Profile</a>
                <a href="/gigs/create/" class="rounded-full bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">Post a gig</a>
                <a href="/logout/" class="text-slate-700 hover:text-slate-900">Logout</a>
            {% else %}
                <a href="/login/" class="text-slate-700 hover:text-slate-900">Login</a>
                <a href="/register/" class="rounded-full bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">Register</a>
            {% endif %}
        </nav>
    </div>
</header>
